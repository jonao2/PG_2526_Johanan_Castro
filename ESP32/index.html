<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Grúa Torre</title>
    <style>
        /* Diseño minimalista y responsivo inspirado en un control remoto real */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            /* Evitar selección accidental en móviles */
            -webkit-user-select: none;
        }

        h1 {
            margin-bottom: 30px;
            color: #38bdf8;
            font-weight: 600 text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .panel {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Pad Direccional (Carro y Giro) */
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn {
            background: #334155;
            border: 2px solid #475569;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Efecto al presionar (Micro-animación) */
        .btn:active,
        .btn.active {
            background: #38bdf8;
            border-color: #38bdf8;
            color: #0f172a;
            transform: scale(0.92);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .btn-empty {
            background: transparent;
            border: none;
            box-shadow: none;
            pointer-events: none;
        }

        /* Botón Stop de Emergencia */
        .btn-stop {
            background: #7f1d1d;
            border-color: #991b1b;
        }

        .btn-stop:active,
        .btn-stop.active {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
        }

        /* Controles de Elevación */
        .elevacion-controls {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: space-between;
        }

        .btn-elev {
            background: #334155;
            border-radius: 12px;
            width: 120px;
            height: 65px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
            border: 2px solid #475569;
            text-transform: uppercase;
        }

        .btn-elev:active,
        .btn-elev.active {
            background: #f59e0b;
            border-color: #f59e0b;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        .label-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: -10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .telemetry-panel {
            margin-top: 30px;
            width: 100%;
            background: #111827;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 18px 22px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .telemetry-title {
            font-size: 14px;
            font-weight: 700;
            color: #7dd3fc;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: #cbd5e1;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .telemetry-row span {
            color: #f8fafc;
            font-weight: 600;
        }

        /* ===== ANIMACIÓN DE BIENVENIDA ===== */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOutUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        @keyframes fadeInPanel {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeOutUp 2s ease-out 2.5s forwards;
        }

        .welcome-content {
            text-align: center;
            animation: fadeInScale 0.8s ease-out;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: fadeInScale 0.8s ease-out 0.2s backwards;
        }

        .welcome-title {
            font-size: 48px;
            font-weight: 700;
            color: #38bdf8;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            animation: fadeInScale 0.8s ease-out 0.4s backwards;
            letter-spacing: 2px;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 40px;
            animation: fadeInScale 0.8s ease-out 0.6s backwards;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .welcome-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            animation: fadeInScale 0.8s ease-out 0.8s backwards;
        }

        .welcome-author {
            margin-top: 20px;
            font-size: 16px;
            color: #cbd5e1;
            font-weight: 600;
            letter-spacing: 1px;
            animation: fadeInScale 0.8s ease-out 1s backwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .welcome-signature-wrapper {
            width: 260px;
            height: 120px;
            position: relative;
            background: #0f172a;
            border-radius: 16px;
            padding: 6px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }

        /* Firma (imagen) que aparece antes del nombre y se desvanece junto al overlay */
        .welcome-signature {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 320px;
            height: auto;
            object-fit: none;
            object-position: center;
            transform: translate(-50%, -50%) rotate(-90deg);
            transform-origin: center center;
            display: block;
            max-width: none;
            max-height: none;
        }

        .welcome-name {
            font-size: 16px;
            color: #cbd5e1;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #38bdf8;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .panel {
            animation: fadeInPanel 1s ease-out 3s forwards;
            opacity: 0;
        }
    </style>
</head>

    <div class="panel">
        <h1>Grúa Torre</h1>

        <div class="label-text">Carro / Giro</div>
        <!-- Pad Direccional -->
        <div class="d-pad">
            <div class="btn-empty"></div>
            <button class="btn" data-cmd="F" aria-label="Adelante">⬆️</button>
            <div class="btn-empty"></div>

            <button class="btn" data-cmd="L" aria-label="Izquierda">↩️</button>
            <button class="btn btn-stop" data-cmd="S" aria-label="Parar">⏹️</button>
            <button class="btn" data-cmd="R" aria-label="Derecha">↪️</button>

            <div class="btn-empty"></div>
            <button class="btn" data-cmd="B" aria-label="Atras">⬇️</button>
            <div class="btn-empty"></div>
        </div>

        <div class="label-text">Elevación</div>
        <!-- Controles de Elevación -->
        <div class="elevacion-controls">
            <button class="btn btn-elev" data-cmd="U">▲ Subir</button>
            <button class="btn btn-elev" data-cmd="D">▼ Bajar</button>
        </div>

        <div class="telemetry-panel">
            <div class="telemetry-title">Telemetría del ESP32</div>
            <div class="telemetry-row">Estado: <span id="telemetry-status">Conectando...</span></div>
            <div class="telemetry-row">IP: <span id="telemetry-ip">Cargando...</span></div>
            <div class="telemetry-row">SSID: <span id="telemetry-ssid">Cargando...</span></div>
            <div class="telemetry-row">RSSI: <span id="telemetry-rssi">Cargando...</span></div>
            <div class="telemetry-row">Uptime: <span id="telemetry-uptime">Cargando...</span></div>
            <div class="telemetry-row">Último comando: <span id="telemetry-last">Cargando...</span></div>
            <div class="telemetry-row">Comandos: <span id="telemetry-count">0</span></div>
        </div>
    </div>

    <script>
        // Lógica de Comunicación con el Servidor ESP32
        let currentInterval = null;

        // Uso de Fetch API para enviar comandos asíncronamente
        function sendCommand(cmd) {
            fetch(`/cmd?action=${cmd}`)
                .catch(err => console.error("Error al enviar comando:", err));
        }

        const buttons = document.querySelectorAll('button');

        buttons.forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');

            // Detección de eventos táctiles vs mouse para asegurar compatibilidad
            const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const startEvent = isTouch ? 'touchstart' : 'mousedown';
            const endEvent = isTouch ? 'touchend' : 'mouseup';
            const leaveEvent = isTouch ? 'touchcancel' : 'mouseleave';

            // Al presionar el botón (Inicia movimiento continuo)
            btn.addEventListener(startEvent, (e) => {
                e.preventDefault(); // Previene doble trigger en móviles
                btn.classList.add('active'); // Feedback visual manual

                if (currentInterval) clearInterval(currentInterval);

                sendCommand(cmd); // Enviar inmediatamente

                // Repetir el comando cada 250ms mientras se mantenga presionado
                // Esto mantiene vivo el "Timeout de Seguridad" en el Arduino
                currentInterval = setInterval(() => sendCommand(cmd), 250);
            });

            // Función para detener (Envía 'S')
            const stopAction = (e) => {
                e.preventDefault();
                btn.classList.remove('active');

                if (currentInterval) {
                    clearInterval(currentInterval);
                    currentInterval = null;
                    sendCommand('S'); // Stop explícito
                }
            };

            // Al soltar el botón o salir del área del botón
            btn.addEventListener(endEvent, stopAction);
            btn.addEventListener(leaveEvent, stopAction);
        });

        function updateTelemetry(data) {
            document.getElementById('telemetry-status').textContent = data.connected ? 'Conectado' : 'Desconectado';
            document.getElementById('telemetry-status').style.color = data.connected ? '#34d399' : '#f87171';
            document.getElementById('telemetry-ip').textContent = data.ip || 'desconocido';
            document.getElementById('telemetry-ssid').textContent = data.ssid || 'desconocido';
            document.getElementById('telemetry-rssi').textContent = data.rssi !== null ? data.rssi + ' dBm' : 'N/A';
            document.getElementById('telemetry-uptime').textContent = data.uptime || '00:00:00';
            document.getElementById('telemetry-last').textContent = data.last_command || 'ninguno';
            document.getElementById('telemetry-count').textContent = data.command_count || 0;
        }

        function showTelemetryError() {
            document.getElementById('telemetry-status').textContent = 'No disponible';
            document.getElementById('telemetry-status').style.color = '#f87171';
            document.getElementById('telemetry-ip').textContent = 'N/A';
            document.getElementById('telemetry-ssid').textContent = 'N/A';
            document.getElementById('telemetry-rssi').textContent = 'N/A';
            document.getElementById('telemetry-uptime').textContent = 'N/A';
            document.getElementById('telemetry-last').textContent = 'N/A';
            document.getElementById('telemetry-count').textContent = '0';
        }

        async function fetchTelemetry() {
            try {
                const response = await fetch('/telemetry');
                if (!response.ok) {
                    showTelemetryError();
                    return;
                }
                const data = await response.json();
                updateTelemetry(data);
            } catch (err) {
                console.error('Error al obtener telemetría:', err);
                showTelemetryError();
            }
        }

        fetchTelemetry();
        setInterval(fetchTelemetry, 2000);

        // Remover overlay de bienvenida después de la animación
        setTimeout(() => {
            const welcomeOverlay = document.getElementById('welcomeOverlay');
            if (welcomeOverlay) {
                welcomeOverlay.style.display = 'none';
            }
        }, 4500); // 3.5s de animación + 1s de buffer
    </script>
</body>
